services:
  suprema-dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DOORS_PATH: /data/doors
      SUPREMA_PATH: /data/support/suprema.xlsx
      SUPPORT_JSON_PATH: /app/exports/doors_reference.json
    volumes:
      - ./exports:/app/exports
      - ./data/doors:/data/doors
      - ./data/support:/data/support:ro
